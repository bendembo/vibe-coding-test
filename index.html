<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallo Benjamin</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 1.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #bye-btn {
      background: #dc2626;
    }

    #bye-btn:hover {
      background: #b91c1c;
    }

    #message {
      margin-top: 1rem;
      font-size: 1.25rem;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <h1>Hallo Benjamin</h1>
  <div class="buttons">
    <button type="button" id="greet-btn">Klick mich</button>
    <button type="button" id="bye-btn">Tschüss sagen</button>
  </div>
  <p id="message" aria-live="polite"></p>

  <script>
    document.getElementById('greet-btn').addEventListener('click', () => {
      document.getElementById('message').textContent = 'Hallo zurück!';
    });
    document.getElementById('bye-btn').addEventListener('click', () => {
      document.getElementById('message').textContent = 'Tschüss Benjamin';
    });
  </script>
</body>
</html>
